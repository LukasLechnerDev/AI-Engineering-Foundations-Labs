<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Engineer Job Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: #FAFBFD; color: #0B1020; }

    .hero {
      background: #0B1020;
      padding: 40px;
    }
    .hero-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .icon-wrap {
      background: #1A2236;
      border-radius: 12px;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hero-text h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: #FFFFFF;
      line-height: 1.2;
    }
    .hero-text h1 span {
      color: #2F6BFF;
    }
    .hero-text p {
      color: #8FB2FF;
      font-size: 0.875rem;
      margin-top: 6px;
    }
    .content {
      max-width: 800px;
      margin: 36px auto;
      padding: 0 40px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 12px;
      border: 1px solid #8FB2FF;
    }
    .card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card h2 a { color: #0B1020; text-decoration: none; }
    .card h2 a:hover { color: #2F6BFF; }
    .company { color: #6B7280; font-size: 0.825rem; font-weight: 500; margin-bottom: 10px; }
    .reason { color: #3D4660; font-size: 0.875rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <div class="icon-wrap">$icon_img</div>
      <div class="hero-text">
        <h1>AI Engineer <span>Job Digest</span></h1>
        <p>$verified_role_count verified roles &nbsp;·&nbsp; from $screened_job_count candidates &nbsp;·&nbsp; Last 24 hours</p>
      </div>
    </div>
  </div>
  <div class="content">
    $cards
  </div>
</body>
</html>
