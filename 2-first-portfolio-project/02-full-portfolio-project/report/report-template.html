<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Engineer Job Report</title>
</head>
<body style="margin:0;padding:0;background-color:#FAFBFD;color:#0B1020;">
  <span style="display:none;font-size:1px;color:#FAFBFD;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    {{ report_title }}
  </span>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#FAFBFD" style="background-color:#FAFBFD;border-collapse:collapse;margin:0;padding:0;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="680" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:680px;border-collapse:collapse;">
          <tr>
            <td style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#0B1020;">
              <p style="color:#64748B;font-size:16px;font-weight:500;line-height:1.4;margin:0 0 14px 0;">
                {{ report_date }} &middot; Calendar week {{ calendar_week }}
              </p>
              <h1 style="color:#0B1020;font-size:32px;font-weight:700;line-height:1.12;margin:0 0 28px 0;">
                {{ report_title }}
              </h1>
              {{ cards }}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
