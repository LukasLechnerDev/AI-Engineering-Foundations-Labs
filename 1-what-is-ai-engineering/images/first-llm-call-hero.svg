<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#FAFBFD"/>
  <circle cx="210" cy="760" r="230" fill="#E7EDF7"/>
  <circle cx="1390" cy="120" r="180" fill="#E7EDF7"/>
  <rect x="92" y="78" width="1416" height="742" rx="42" fill="white" stroke="#D7DFEE" stroke-width="4"/>

  <rect x="144" y="140" width="844" height="520" rx="34" fill="#0B1020"/>
  <rect x="178" y="176" width="776" height="84" rx="24" fill="#111A36"/>
  <circle cx="224" cy="218" r="10" fill="#FF7A70"/>
  <circle cx="256" cy="218" r="10" fill="#FFCB4F"/>
  <circle cx="288" cy="218" r="10" fill="#51D27A"/>
  <rect x="334" y="198" width="210" height="38" rx="19" fill="#1C2A57"/>
  <text x="362" y="223" fill="#E8EEF8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">first-openai-call</text>

  <text x="226" y="338" fill="#51D27A" font-family="Courier New, monospace" font-size="30" font-weight="700">$ cp .env.example .env</text>
  <text x="226" y="390" fill="#D8E1F0" font-family="Courier New, monospace" font-size="28">OPENAI_API_KEY=sk-proj-...</text>
  <text x="226" y="440" fill="#D8E1F0" font-family="Courier New, monospace" font-size="28">client = OpenAI()</text>
  <text x="226" y="490" fill="#D8E1F0" font-family="Courier New, monospace" font-size="28">response = client.responses.create(...)</text>

  <rect x="226" y="544" width="266" height="56" rx="18" fill="#2F6BFF"/>
  <text x="260" y="579" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">API Key Ready</text>
  <rect x="510" y="544" width="336" height="56" rx="18" fill="#E7EDF7"/>
  <text x="548" y="579" fill="#0B1020" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Model: gpt-5.4-nano</text>

  <rect x="1048" y="140" width="372" height="170" rx="28" fill="#F5F8FE" stroke="#D7DFEE" stroke-width="4"/>
  <text x="1084" y="194" fill="#0B1020" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">1. Create `.env`</text>
  <text x="1084" y="236" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="22">Store the API key locally</text>
  <rect x="1084" y="256" width="214" height="30" rx="15" fill="#E7EDF7"/>
  <text x="1106" y="277" fill="#0B1020" font-family="Courier New, monospace" font-size="16" font-weight="700">.env.example</text>

  <rect x="1048" y="336" width="372" height="184" rx="28" fill="#2F6BFF"/>
  <text x="1084" y="392" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">2. Check Key</text>
  <text x="1084" y="434" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22">Validate `OPENAI_API_KEY`</text>
  <rect x="1084" y="456" width="236" height="32" rx="16" fill="#D9E5FF"/>
  <text x="1106" y="478" fill="#0B1020" font-family="Courier New, monospace" font-size="16" font-weight="700">starts with sk-proj-</text>

  <rect x="1048" y="548" width="372" height="202" rx="28" fill="#F5F8FE" stroke="#D7DFEE" stroke-width="4"/>
  <text x="1084" y="604" fill="#0B1020" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">3. First Request</text>
  <text x="1084" y="646" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="22">Send a prompt with the SDK</text>
  <rect x="1084" y="668" width="276" height="32" rx="16" fill="#E7EDF7"/>
  <text x="1106" y="690" fill="#0B1020" font-family="Courier New, monospace" font-size="16" font-weight="700">This is my first prompt</text>
  <rect x="1084" y="712" width="218" height="32" rx="16" fill="#E7EDF7"/>
  <text x="1106" y="734" fill="#0B1020" font-family="Courier New, monospace" font-size="16" font-weight="700">print(response.output_text)</text>

  <rect x="204" y="744" width="764" height="52" rx="18" fill="#F5F8FE" stroke="#D7DFEE" stroke-width="3"/>
  <text x="586" y="776" text-anchor="middle" fill="#0B1020" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">From API key setup to a real OpenAI response in one notebook</text>
</svg>
